# ============================================================
# 答辩准备配置文件
# ============================================================
# 用途：配置答辩PPT结构、Q&A准备、时间规划等
# 使用方式：根据学校要求和个人情况调整
# ============================================================

# ------------------------------------------------------------
# 答辩PPT配置
# ------------------------------------------------------------
ppt:
  # 总页数（一般15-20页）
  total_slides: 20

  # 答辩时长（分钟）
  presentation_time: 15

  # PPT结构设计
  structure:
    - section: "封面"
      slides: 1
      content:
        - "论文题目"
        - "作者信息"
        - "导师信息"
        - "学校/学院"
        - "答辩日期"

    - section: "目录"
      slides: 1
      content:
        - "研究背景与问题"
        - "研究方法与数据"
        - "核心发现"
        - "策略方案"
        - "研究结论"

    - section: "研究背景与问题"
      slides: 3
      content:
        - "宏观背景（行业/政策）"
        - "微观背景（企业现状）"
        - "研究问题与意义"
      time_minutes: 2

    - section: "文献综述与理论框架"
      slides: 2
      content:
        - "核心理论概述"
        - "研究框架图"
      time_minutes: 1.5

    - section: "研究方法与数据"
      slides: 2
      content:
        - "研究设计与方法"
        - "数据收集与样本"
      time_minutes: 1.5

    - section: "核心发现"
      slides: 5
      content:
        - "现状分析结果"
        - "问题诊断"
        - "数据图表展示"
        - "关键发现1"
        - "关键发现2"
      time_minutes: 4

    - section: "策略方案"
      slides: 4
      content:
        - "优化框架设计"
        - "核心策略1"
        - "核心策略2"
        - "实施路径"
      time_minutes: 3

    - section: "研究结论"
      slides: 2
      content:
        - "主要结论"
        - "研究贡献"
      time_minutes: 1.5

    - section: "局限性与展望"
      slides: 1
      content:
        - "研究局限"
        - "未来方向"
      time_minutes: 0.5

    - section: "致谢"
      slides: 1
      content:
        - "感谢导师"
        - "感谢评委"

  # PPT设计建议
  design_tips:
    - "每页文字不超过6行"
    - "使用图表代替大段文字"
    - "配色统一，建议使用学校主题色"
    - "关键数据用醒目颜色标注"
    - "动画简洁，避免花哨"

# ------------------------------------------------------------
# 答辩准备时间线
# ------------------------------------------------------------
defense_preparation:
  # 准备周期（周）
  timeline_weeks: 6

  # 各阶段任务
  timeline:
    - week: 1
      tasks:
        - "完成论文终稿"
        - "整理核心数据和图表"
        - "确定PPT大纲"
    - week: 2
      tasks:
        - "制作PPT初稿"
        - "准备讲稿"
        - "梳理核心观点"
    - week: 3
      tasks:
        - "PPT修改完善"
        - "准备Q&A问题库"
        - "第一次模拟答辩"
    - week: 4
      tasks:
        - "根据模拟反馈修改"
        - "优化演讲节奏"
        - "第二次模拟答辩"
    - week: 5
      tasks:
        - "最终修改"
        - "熟悉场地/设备"
        - "第三次模拟答辩"
    - week: 6
      tasks:
        - "最终检查"
        - "放松心态"
        - "正式答辩"

  # 模拟答辩次数
  mock_sessions: 3

# ------------------------------------------------------------
# Q&A问题准备
# ------------------------------------------------------------
qa_preparation:
  # 常见问题分类
  question_categories:
    - category: "澄清类问题"
      description: "要求解释论文中的概念、方法或结论"
      example_questions:
        - "请解释一下你论文中XX概念的含义"
        - "你如何理解XX理论？"
        - "请详细说明你的数据收集过程"
      preparation_tips:
        - "熟悉论文中所有核心概念"
        - "准备简洁明了的解释"
        - "用具体例子辅助说明"

    - category: "方法论质疑"
      description: "质疑研究方法的合理性、数据的可靠性"
      example_questions:
        - "为什么选择这种研究方法？"
        - "你的样本量是否足够？"
        - "如何保证问卷的信效度？"
      preparation_tips:
        - "说明方法选择的理由"
        - "引用方法论文献支持"
        - "承认局限性并说明应对措施"

    - category: "实践价值问题"
      description: "质疑研究成果的实际应用价值"
      example_questions:
        - "你的策略方案如何落地实施？"
        - "这个方案的成本效益如何？"
        - "对同行业其他企业有何借鉴意义？"
      preparation_tips:
        - "准备具体的实施步骤"
        - "提供成本效益分析"
        - "说明方案的可复制性"

    - category: "理论适配与应用价值问题"
      description: "质疑理论工具选择是否适配案例问题，以及研究的应用价值"
      example_questions:
        - "你为什么选择这些理论工具？"
        - "这些理论如何帮助解决案例组织的实际问题？"
        - "你的方案对同类机构有什么参考价值？"
      preparation_tips:
        - "说明理论与案例问题的匹配关系"
        - "用诊断和策略闭环证明理论不是堆砌"
        - "强调情境化应用价值，避免夸大理论贡献"

    - category: "局限性问题"
      description: "询问研究的不足和改进方向"
      example_questions:
        - "你认为研究最大的局限是什么？"
        - "如果重新做这个研究，你会如何改进？"
        - "未来研究方向是什么？"
      preparation_tips:
        - "诚实承认局限性"
        - "说明局限性的原因"
        - "提出改进方案"

    - category: "细节追问"
      description: "针对论文具体内容的深入提问"
      example_questions:
        - "论文第X页的数据来源是什么？"
        - "这个结论是如何得出的？"
        - "参考文献XX的主要观点是什么？"
      preparation_tips:
        - "熟悉论文每个细节"
        - "标注关键数据来源"
        - "理解引用文献的核心观点"

  # 模拟问答题库（根据论文内容生成）
  mock_questions:
    # 由AI根据论文内容自动生成
    auto_generate: true
    manual_questions: []

# ------------------------------------------------------------
# 答辩技巧
# ------------------------------------------------------------
presentation_tips:
  # 开场技巧
  opening:
    - "简洁介绍自己和论文题目"
    - "说明研究的核心问题"
    - "预告演讲结构"

  # 演讲技巧
  delivery:
    - "语速适中，不要太快"
    - "与评委保持眼神交流"
    - "重点内容适当停顿"
    - "使用手势辅助表达"
    - "控制好时间节奏"

  # 回答技巧
  answering:
    - "认真听完问题再回答"
    - "不理解可以请评委重复"
    - "回答要有条理（第一、第二...）"
    - "不知道的诚实说明"
    - "不要与评委争论"

  # 结尾技巧
  closing:
    - "总结核心结论"
    - "感谢评委提问"
    - "表达对研究的热爱"

# ------------------------------------------------------------
# 答辩物品清单
# ------------------------------------------------------------
checklist:
  # 必备物品
  essential:
    - "论文打印稿（至少3份）"
    - "PPT电子版（U盘+云端备份）"
    - "学生证/身份证"
    - "答辩记录本"
    - "笔"

  # 建议物品
  recommended:
    - "计算器"
    - "论文电子版"
    - "参考资料"
    - "水杯"
    - "纸巾"

  # 检查事项
  pre_check:
    - "提前测试PPT播放"
    - "确认答辩时间和地点"
    - "了解答辩流程"
    - "确认评委名单"
    - "检查着装"
