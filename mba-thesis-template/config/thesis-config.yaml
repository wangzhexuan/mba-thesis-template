# ============================================================
# 论文核心配置文件
# ============================================================
# 用途：存储论文基本信息、研究设计、研究方法等核心配置
# 使用方式：运行 init.sh 交互式向导自动生成，或手动编辑
# ============================================================

# ------------------------------------------------------------
# 论文元数据
# ------------------------------------------------------------
metadata:
  title: ""                           # 论文中文题目
  title_en: ""                        # 论文英文题目
  author: ""                          # 作者姓名
  student_id: ""                      # 学号
  school: ""                          # 学校名称
  college: ""                         # 学院名称
  program: "MBA"                      # 学位类型：MBA/EMBA/DBA
  supervisor: ""                      # 导师姓名
  supervisor_title: ""                # 导师职称
  research_direction: ""              # 研究方向
  completion_date: ""                 # 完成时间（YYYY年MM月）
  defense_date: ""                    # 答辩时间（YYYY年MM月）

# ------------------------------------------------------------
# 研究问题
# ------------------------------------------------------------
research_questions:
  primary: ""                         # 主要研究问题
  secondary:                          # 次要研究问题（可多个）
    - ""
    - ""

# ------------------------------------------------------------
# 关键词
# ------------------------------------------------------------
keywords:
  chinese:                            # 中文关键词（3-5个）
    - ""
    - ""
    - ""
  english:                            # 英文关键词（3-5个）
    - ""
    - ""
    - ""

# ------------------------------------------------------------
# 研究方法
# ------------------------------------------------------------
methodology:
  # 研究类型
  # 可选值：case_study（案例研究）/ survey（问卷调查）/ action_research（行动研究）/ mixed（混合研究）
  type: "case_study"

  # 具体研究方法（可多选）
  # 可选值：questionnaire / interview / observation / document_analysis / secondary_data
  methods:
    - "questionnaire"
    - "interview"

  # 样本信息
  sample_size: 0                      # 问卷样本量
  interview_count: 0                  # 访谈人数
  data_collection_period: ""          # 数据收集时间段（如：2025年3月-5月）

# ------------------------------------------------------------
# 研究对象
# ------------------------------------------------------------
research_subject:
  name: ""                            # 研究对象名称（如：A公司）
  industry: ""                        # 所属行业
  scale: ""                           # 企业规模描述
  location: ""                        # 地理位置
  brief_description: ""               # 简要描述

# ------------------------------------------------------------
# 论文结构
# ------------------------------------------------------------
structure:
  # 章节制式：5（标准五章制）/ 6（扩展六章制）
  chapter_count: 5

  # 章节标题（根据实际修改）
  chapters:
    - number: 1
      title: "绪论"
    - number: 2
      title: "相关理论与文献综述"
    - number: 3
      title: "现状分析"
    - number: 4
      title: "策略优化"
    - number: 5
      title: "结论与展望"

# ------------------------------------------------------------
# 写作进度跟踪
# ------------------------------------------------------------
progress:
  # 各阶段状态：not_started / in_progress / completed / reviewed
  setup: "not_started"
  literature: "not_started"
  framework: "not_started"
  data_collection: "not_started"
  writing: "not_started"
  review: "not_started"
  defense: "not_started"

  # 里程碑日期
  milestones:
    proposal_date: ""                 # 开题日期
    first_draft_date: ""              # 初稿完成日期
    review_date: ""                   # 外审日期
    defense_date: ""                  # 答辩日期
    final_date: ""                    # 终稿日期
